name: Build Pleiada Recorder Installer

on:
  push:
    tags:
      - 'v*'          # triggers on: git tag v0.17 && git push --tags
  workflow_dispatch:  # allows manual trigger from the GitHub UI

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # required to create GitHub Releases

    steps:
      # ── 1. Checkout source ────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Create deps directory ──────────────────────────────────
      - name: Create deps directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path "pleiada_installer\deps" | Out-Null

      # ── 3. Download Python 3.12.8 installer ───────────────────────
      - name: Download Python 3.12.8
        shell: pwsh
        run: |
          $dest = "pleiada_installer\deps\python-3.12.8-amd64.exe"
          Write-Host "Downloading Python 3.12.8..."
          Invoke-WebRequest `
            -Uri "https://www.python.org/ftp/python/3.12.8/python-3.12.8-amd64.exe" `
            -OutFile $dest `
            -UseBasicParsing
          $mb = [math]::Round((Get-Item $dest).Length / 1MB, 1)
          Write-Host "Python installer: $mb MB"

      # ── 4. Download AutoHotkey v2.0.24 installer ──────────────────
      #    autohotkey.com is protected by Cloudflare bot challenge.
      #    GitHub Releases also redirects there, so we use the GitHub CLI
      #    (gh) which ships on all runners and downloads release assets
      #    via the authenticated API, bypassing Cloudflare entirely.
      - name: Download AutoHotkey v2.0.24
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Write-Host "Downloading AutoHotkey v2.0.24 via GitHub CLI..."
          gh release download v2.0.24 `
            --repo AutoHotkey/AutoHotkey `
            --pattern "*setup*" `
            --dir "pleiada_installer\deps" `
            --clobber
          # Normalize filename to what setup.iss expects
          $found = Get-ChildItem "pleiada_installer\deps\*setup*" | Select-Object -First 1
          if (-not $found) { Write-Error "AHK installer not found after download"; exit 1 }
          $target = "pleiada_installer\deps\AutoHotkey_2.0.24_setup.exe"
          if ($found.FullName -ne (Resolve-Path $target -ErrorAction SilentlyContinue)) {
            Move-Item $found.FullName $target -Force
          }
          $mb = [math]::Round((Get-Item $target).Length / 1MB, 1)
          Write-Host "AHK installer: $mb MB"

      # ── 5. Download OBS Studio 32.1.2 installer ───────────────────
      - name: Download OBS Studio 32.1.2
        shell: pwsh
        run: |
          $dest = "pleiada_installer\deps\OBS-Studio-32.1.2-Windows-x64-Installer.exe"
          Write-Host "Downloading OBS Studio 32.1.2..."
          Invoke-WebRequest `
            -Uri "https://github.com/obsproject/obs-studio/releases/download/32.1.2/OBS-Studio-32.1.2-Windows-x64-Installer.exe" `
            -OutFile $dest `
            -UseBasicParsing
          $mb = [math]::Round((Get-Item $dest).Length / 1MB, 1)
          Write-Host "OBS installer: $mb MB"

      # ── 6. Install Inno Setup 6 via Chocolatey ────────────────────
      #    choco is pre-installed on all GitHub Actions Windows runners.
      - name: Install Inno Setup 6
        shell: pwsh
        run: |
          Write-Host "Installing Inno Setup via Chocolatey..."
          choco install innosetup --yes --no-progress
          Write-Host "Inno Setup installed."

      # ── 7. Compile the installer ──────────────────────────────────
      - name: Compile installer with ISCC
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "C:\Program Files\Inno Setup 6\ISCC.exe"
          }
          Write-Host "Using ISCC: $iscc"
          & $iscc "pleiada_installer\setup.iss"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "ISCC exited with code $LASTEXITCODE"
            exit 1
          }

      # ── 8. Locate compiled .exe ───────────────────────────────────
      - name: Verify output
        shell: pwsh
        run: |
          $exe = Get-ChildItem "pleiada_installer\Output\*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in Output\"; exit 1 }
          $mb = [math]::Round($exe.Length / 1MB, 1)
          Write-Host "Built: $($exe.Name) ($mb MB)"
          echo "EXE_PATH=$($exe.FullName)" >> $env:GITHUB_ENV
          echo "EXE_NAME=$($exe.Name)" >> $env:GITHUB_ENV

      # ── 9. Upload as workflow artifact (versioned, for internal use) ─
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PleiadaRecorder_Setup_${{ github.ref_name }}
          path: ${{ env.EXE_PATH }}
          retention-days: 30

      # ── 10. Extraer notas de la version desde CHANGELOG.md ──────────
      - name: Extract release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = "V" + ($tag -replace "v0\.", "")
          $lines = Get-Content "CHANGELOG.md"
          $notes = @()
          $capturing = $false
          foreach ($line in $lines) {
            if ($line -match "^## $version\b") { $capturing = $true; continue }
            if ($capturing -and $line -match "^## ") { break }
            if ($capturing) { $notes += $line }
          }
          $body = ($notes | Out-String).Trim()
          if (-not $body) { $body = "Ver CHANGELOG.md para detalles." }
          $body | Out-File "release_notes.txt" -Encoding utf8

      # ── 11. Publish GitHub Release con nombre de archivo fijo ────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Pleiada Recorder ${{ github.ref_name }}
          body_path: release_notes.txt
          files: ${{ env.EXE_PATH }}
          draft: false
          prerelease: false

      # ── 12. Borrar .exe de releases anteriores ────────────────────────
      - name: Remove exe from previous releases
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $currentTag = "${{ github.ref_name }}"
          $releases = gh release list --repo ${{ github.repository }} --json tagName,assets | ConvertFrom-Json
          foreach ($release in $releases) {
            if ($release.tagName -ne $currentTag) {
              foreach ($asset in $release.assets) {
                if ($asset.name -like "*.exe") {
                  Write-Host "Eliminando $($asset.name) de release $($release.tagName)..."
                  gh release delete-asset $release.tagName $asset.name --yes --repo ${{ github.repository }}
                }
              }
            }
          }
